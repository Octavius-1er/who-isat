<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    :root { --green: #25D366; --dark: #075E54; --bg-chat: #ECE5DD; }

    .phone { width: 390px; max-width: 100vw; height: 780px; max-height: 100vh; display: flex; flex-direction: column; background: #fff; border-radius: 32px; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.5); position: relative; }
    .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .screen.active { display: flex; }

    /* LOADING */
    .loading-screen { align-items: center; justify-content: center; background: #fff; gap: 16px; }
    .loading-spinner { width: 48px; height: 48px; border: 4px solid #e0e0e0; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #888; }

    .auth-screen { align-items: center; justify-content: center; padding: 2rem; gap: 1.1rem; background: #fff; }
    .auth-logo { width: 72px; height: 72px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .auth-logo svg { width: 40px; height: 40px; fill: white; }
    .auth-title { font-size: 24px; font-weight: 700; color: #111; }
    .auth-subtitle { font-size: 14px; color: #888; text-align: center; }
    .auth-tabs { display: flex; gap: 6px; background: #f3f3f3; padding: 4px; border-radius: 12px; width: 100%; max-width: 320px; }
    .auth-tab { flex: 1; padding: 8px; text-align: center; font-size: 14px; cursor: pointer; border-radius: 9px; color: #888; border: none; background: none; font-family: inherit; transition: all 0.15s; }
    .auth-tab.active { background: #fff; color: #111; font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .auth-form { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
    .auth-form input { width: 100%; padding: 12px 14px; font-size: 15px; border-radius: 12px; border: 1.5px solid #e0e0e0; background: #fafafa; color: #111; font-family: inherit; outline: none; transition: border 0.15s; }
    .auth-form input:focus { border-color: var(--green); }
    .avatar-picker { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .avatar-preview { width: 72px; height: 72px; border-radius: 50%; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; background: #f3f3f3; overflow: hidden; }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-preview-label { font-size: 12px; color: #888; }
    .btn-green { width: 100%; padding: 13px; background: var(--green); color: white; font-size: 15px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; }
    .btn-green:hover { opacity: 0.88; }
    .code-box { background: #f3f3f3; border-radius: 12px; padding: 12px 16px; font-size: 13px; color: #888; text-align: center; width: 100%; }
    .code-box span { font-size: 22px; font-weight: 700; color: var(--dark); letter-spacing: 4px; display: block; margin-top: 4px; font-family: monospace; }
    .err { font-size: 13px; color: #e74c3c; text-align: center; min-height: 18px; }

    .home-tabs { display: flex; background: var(--dark); flex-shrink: 0; }
    .home-tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.55); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; font-family: inherit; transition: all 0.15s; }
    .home-tab.active { color: white; border-bottom-color: white; }

    .wa-header { background: var(--dark); color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .wa-header-left { display: flex; align-items: center; gap: 10px; }
    .hdr-av { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; }
    .hdr-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .wa-header-title { font-size: 20px; font-weight: 700; }
    .wa-header-sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }
    .wa-header-actions { display: flex; gap: 14px; }
    .wa-header-btn { background: none; border: none; cursor: pointer; color: white; font-size: 20px; line-height: 1; }

    .conv-list { flex: 1; overflow-y: auto; background: #fff; }
    .conv-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
    .conv-item:hover { background: #f9f9f9; }
    .ci-av { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; color: white; }
    .ci-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .ci-info { flex: 1; min-width: 0; }
    .ci-name { font-size: 16px; font-weight: 600; color: #111; }
    .ci-preview { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .ci-time { font-size: 11px; color: #aaa; flex-shrink: 0; }
    .empty-list { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 2rem; color: #888; font-size: 14px; text-align: center; }

    .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 20; }
    .modal-box { background: #fff; border-radius: 20px; padding: 1.5rem; width: 310px; display: flex; flex-direction: column; gap: 12px; max-height: 88%; overflow-y: auto; }
    .modal-title { font-size: 17px; font-weight: 700; color: #111; }
    .modal-desc { font-size: 13px; color: #888; }
    .modal-input { width: 100%; padding: 11px 14px; font-size: 15px; border-radius: 12px; border: 1.5px solid #e0e0e0; background: #fafafa; color: #111; font-family: inherit; outline: none; }
    .modal-input:focus { border-color: var(--green); }
    .modal-input.code-style { font-family: monospace; letter-spacing: 3px; text-transform: uppercase; }
    .modal-actions { display: flex; gap: 8px; }
    .btn-cancel { flex: 1; padding: 11px; background: #f3f3f3; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; color: #555; font-family: inherit; }
    .btn-cancel:hover { background: #e8e8e8; }
    .btn-ok { flex: 1; padding: 11px; background: var(--green); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; }
    .btn-ok:hover { opacity: 0.88; }
    .contact-list-modal { display: flex; flex-direction: column; gap: 4px; max-height: 190px; overflow-y: auto; }
    .contact-check { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; cursor: pointer; transition: background 0.1s; }
    .contact-check:hover { background: #f3f3f3; }
    .contact-check input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--green); flex-shrink: 0; cursor: pointer; }
    .cc-av { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; }
    .cc-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .contact-check-name { font-size: 14px; color: #111; }

    .chat-header { background: var(--dark); color: white; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .chat-back { background: none; border: none; color: white; cursor: pointer; font-size: 22px; line-height: 1; padding: 2px; }
    .chat-hd-av { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; }
    .chat-hd-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .chat-hd-info { flex: 1; min-width: 0; }
    .chat-hd-name { font-size: 16px; font-weight: 600; }
    .chat-hd-sub { font-size: 11px; opacity: 0.75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 5px; background: var(--bg-chat); }
    .msg { max-width: 78%; padding: 7px 10px 4px; border-radius: 8px; font-size: 14px; line-height: 1.45; }
    .msg.out { align-self: flex-end; background: #DCF8C6; color: #111; border-radius: 8px 0 8px 8px; }
    .msg.in { align-self: flex-start; background: #fff; color: #111; border-radius: 0 8px 8px 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .msg-sender { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
    .msg-time { font-size: 10px; color: #999; margin-top: 3px; text-align: right; }
    .chat-input-bar { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: #f0f0f0; flex-shrink: 0; }
    .chat-input { flex: 1; padding: 10px 14px; border-radius: 22px; border: none; background: #fff; font-size: 14px; color: #111; outline: none; font-family: inherit; }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--green); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
    .send-btn:active { transform: scale(0.92); }
    .send-btn svg { width: 20px; height: 20px; fill: white; }
    .no-msgs { text-align: center; color: #aaa; font-size: 13px; margin: auto; }
    .msg-status { display: inline-flex; align-items: center; margin-left: 3px; vertical-align: middle; }
    .msg-status svg { width: 16px; height: 16px; }
    .msg.deleting { opacity: 0.4; transition: opacity 0.2s; }

    /* ===== VOICE MESSAGE BUTTON ===== */
    .mic-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--green); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, background 0.2s;
      user-select: none; -webkit-user-select: none;
      touch-action: none;
    }
    .mic-btn svg { width: 20px; height: 20px; fill: white; pointer-events: none; }
    .mic-btn.recording {
      background: #e74c3c;
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
      50%      { transform: scale(1.08); box-shadow: 0 0 0 8px rgba(231,76,60,0); }
    }

    /* ===== RECORDING BAR ===== */
    .recording-bar {
      display: none; align-items: center; gap: 10px;
      padding: 8px 14px; background: #fff3f3;
      border-top: 1px solid #ffd5d5; flex-shrink: 0;
      animation: slideUp 0.2s ease;
    }
    .recording-bar.active { display: flex; }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .rec-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #e74c3c; flex-shrink: 0;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .rec-label { font-size: 13px; color: #e74c3c; font-weight: 600; flex: 1; }
    .rec-timer { font-size: 13px; color: #e74c3c; font-family: monospace; font-weight: 700; min-width: 40px; text-align: right; }
    .rec-cancel-btn {
      background: none; border: none; font-size: 13px;
      color: #888; cursor: pointer; padding: 4px 8px;
      border-radius: 8px; font-family: inherit;
    }
    .rec-cancel-btn:hover { background: #f0f0f0; }

    /* ===== WAVEFORM ANIMATION (in bar) ===== */
    .rec-wave { display: flex; align-items: center; gap: 2px; height: 20px; }
    .rec-wave span {
      display: block; width: 3px; border-radius: 2px;
      background: #e74c3c; animation: wave-bar 0.8s ease-in-out infinite;
    }
    .rec-wave span:nth-child(1) { animation-delay: 0s;    height: 6px; }
    .rec-wave span:nth-child(2) { animation-delay: 0.1s;  height: 14px; }
    .rec-wave span:nth-child(3) { animation-delay: 0.2s;  height: 20px; }
    .rec-wave span:nth-child(4) { animation-delay: 0.15s; height: 12px; }
    .rec-wave span:nth-child(5) { animation-delay: 0.05s; height: 8px; }
    @keyframes wave-bar {
      0%,100% { transform: scaleY(0.4); }
      50%      { transform: scaleY(1); }
    }

    /* ===== AUDIO PLAYER in bubble ===== */
    .msg-audio {
      display: flex; align-items: center; gap: 8px;
      min-width: 180px; max-width: 240px; padding: 2px 0 4px;
    }
    .audio-play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: transform 0.1s;
    }
    .msg.out .audio-play-btn { background: rgba(0,0,0,0.12); }
    .msg.in  .audio-play-btn { background: var(--green); }
    .audio-play-btn:active { transform: scale(0.9); }
    .audio-play-btn svg { width: 16px; height: 16px; }
    .msg.out .audio-play-btn svg { fill: #075E54; }
    .msg.in  .audio-play-btn svg { fill: white; }

    .audio-waveform {
      flex: 1; height: 28px; display: flex;
      align-items: center; gap: 2px; overflow: hidden;
      cursor: pointer; position: relative;
    }
    .audio-waveform-bar {
      flex: 1; border-radius: 2px; transition: background 0.1s;
      min-width: 2px;
    }
    .msg.out .audio-waveform-bar         { background: rgba(0,100,0,0.25); }
    .msg.out .audio-waveform-bar.played  { background: rgba(0,100,0,0.6); }
    .msg.in  .audio-waveform-bar         { background: rgba(0,0,0,0.15); }
    .msg.in  .audio-waveform-bar.played  { background: var(--green); }

    .audio-duration {
      font-size: 11px; color: #888; min-width: 32px;
      text-align: right; flex-shrink: 0;
    }
    .msg.out .audio-duration { color: #5a8a5a; }

    /* Reactions */
    .msg-reactions { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
    .reaction-badge { display: inline-flex; align-items: center; gap: 2px; background: rgba(0,0,0,0.07); border-radius: 10px; padding: 1px 6px; font-size: 13px; cursor: pointer; user-select: none; border: 1.5px solid transparent; transition: background 0.15s; }
    .reaction-badge.mine { background: #d4f0ff; border-color: #34B7F1; }
    .reaction-badge .r-count { font-size: 11px; color: #555; font-weight: 600; }
    .msg.out .reaction-badge { background: rgba(0,0,0,0.09); }
    .msg.out .reaction-badge.mine { background: #b2dfdb; border-color: #075E54; }

    /* Emoji picker popup */
    .emoji-picker-popup { position: absolute; background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.18); padding: 6px 10px; display: flex; gap: 6px; z-index: 50; font
